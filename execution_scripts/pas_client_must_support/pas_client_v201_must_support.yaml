sessions:
  - suite: davinci_pas_client_suite_v201
    name: client
    preset: pas-client-v201-must-support-responses
    suite_options:
      client_type: other_auth
  - suite: davinci_pas_server_suite_v201
    name: server
    preset: pas-server-v201-run-against-pas-client-tests

steps:
  - state_description: client session created
    session: client
    status: created
    start_run:
      session: client
      runnable: 10
    action_description: Run Must Support Elements

  - state_description: Wait at Client test 10.1.01 (gather must support requests)
    session: client
    status: waiting
    last_completed: 10.1.01
    timeout: 600
    start_run:
      session: server
      runnable: 3
    next_poll_session: server
    action_description: Run Server Group 3 Demonstrate Element Support

  - state_description: Finished Server Group 3 Demonstrate Element Support
    session: server
    status: done
    last_completed: 3
    timeout: 300
    command: "curl -o /dev/null -s '{client.wait_outputs.confirmation_url}'"
    next_poll_session: client
    action_description: Confirm in Client session that all requests have been sent

  - state_description: Wait at $submit response handling attestation
    session: client
    status: waiting
    last_completed: 10.4.10
    timeout: 300
    command: "curl -o /dev/null -s '{wait_outputs.attest_true_url}'"
    action_description: Attest that the client handled the $submit response Must Support elements

  - state_description: Wait at $inquire response handling attestation
    session: client
    status: waiting
    last_completed: 10.7.09
    timeout: 300
    command: "curl -o /dev/null -s '{wait_outputs.attest_true_url}'"
    action_description: Attest that the client handled the $inquire response Must Support elements

  - state_description: Must Support execution completed
    session: client
    status: done
    last_completed: 10
    action: END_SCRIPT
    action_description: Complete the script
